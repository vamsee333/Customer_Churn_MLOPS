# .github/workflows/ci.yml
# =============================================================================
# CI — Runs on every Pull Request targeting master
#
# What it does:
#   1. Installs Python dependencies
#   2. Runs pytest with coverage
#   3. Fails the PR if any test fails or coverage drops below 80%
#   4. Uploads the coverage report as a downloadable artifact
# =============================================================================

name: CI — Unit Tests & Coverage

on:
  pull_request:
    branches: [master]

  # Manual trigger from the Actions tab — useful for debugging
  workflow_dispatch:

jobs:
  test:
    name: pytest (python-3.10)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      #    Only ML + test packages — no Azure SDK needed for unit tests
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            scikit-learn==1.5.0 \
            pandas==2.2.2 \
            numpy==1.26.4 \
            joblib==1.4.2 \
            pytest==8.2.0 \
            pytest-cov==5.0.0

      # -----------------------------------------------------------------------
      # 4. Run tests with coverage
      #    --cov-fail-under=80 fails the job if coverage drops below 80%
      #    PYTHONPATH=src so imports resolve without credentials or config files
      # -----------------------------------------------------------------------
      - name: Run pytest with coverage
        env:
          PYTHONPATH: src
        run: |
          pytest tests/test_pipeline.py \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v \
            --tb=short

      # -----------------------------------------------------------------------
      # 5. Upload coverage XML as a downloadable artifact
      #    Available in the Actions tab → your run → Artifacts section
      #    Visible even if tests failed — useful for debugging missed lines
      # -----------------------------------------------------------------------
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml